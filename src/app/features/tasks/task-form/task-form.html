<p-dialog
  [header]="title"
  [visible]="visible()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '500px' }"
  (onHide)="onCancel()"
>
  <form [formGroup]="form">
    <div class="field">
      <label for="title">Título <span class="required">*</span></label>
      <input
        type="text"
        id="title"
        pInputText
        formControlName="title"
        placeholder="Nombre de la tarea"
      />
      @if (form.controls.title.invalid && form.controls.title.touched) {
        <small class="error"> El título es obligatorio </small>
      }
    </div>
    <div class="field">
      <label for="description">Descripción</label>
      <textarea
        type="text"
        id="description"
        pTextArea
        formControlName="description"
        placeholder="Esta tarea consiste en..."
        rows="3"
      ></textarea>
    </div>
    <div class="field">
      <label for="priority">Prioridad <span class="required">*</span></label>
      <p-select
        inputId="priority"
        [options]="priorityOptions"
        optionLabel="label"
        optionValue="value"
        [ngModel]="priorityControl.value"
        (onChange)="priorityControl.setValue($event.value)"
        [ngModelOptions]="{ standalone: true }"
        placeholder="Selecciona una prioridad"
        appendTo="body"
      />
      @if (form.controls.priority.invalid && form.controls.priority.touched) {
        <small class="error"> La prioridad es obligatoria </small>
      }
    </div>
    <div class="field">
      <label for="status">Estado</label>
      <p-select
        inputId="status"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        [ngModel]="statusControl.value"
        (onChange)="statusControl.setValue($event.value)"
        [ngModelOptions]="{ standalone: true }"
        appendTo="body"
      />
    </div>
    <div class="field">
      <label for="endDate">Fecha límite <span class="required">*</span></label>
      <p-datepicker
        inputId="endDate"
        formControlName="endDate"
        dateFormat="dd/mm/yy"
        [showIcon]="true"
        appendTo="body"
      />
      @if (form.controls.endDate.invalid && form.controls.endDate.touched) {
        <small class="error">La fecha es obligatoria</small>
      }
    </div>
  </form>
  <ng-template #footer>
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="onCancel()" />
    <p-button label="Guardar" (onClick)="onSave()" />
  </ng-template>
</p-dialog>
